quarkus.http.port=8090
quarkus.http.host=0.0.0.0

quarkus.http.cors=true
quarkus.http.cors.origins=https://pos.gasolinera.com,http://localhost:5173,http://localhost:5174,http://127.0.0.1:5173,http://127.0.0.1:5174,http://192.168.1.100:5173,http://192.168.1.10:5173
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=accept,authorization,content-type,x-requested-with
quarkus.http.cors.exposed-headers=location,info

fusion.ip=${FUSION_IP:localhost}
fusion.port=${FUSION_PORT:3011}
fusion.echo.interval.seconds=120
fusion.reconnect.max.delay.seconds=60

powerfin.url=${POWERFIN_URL:http://localhost:8080}
powerfin.api.key=${POWERFIN_API_KEY}
powerfin.timeout.seconds=10

pending.sales.file=${PENDING_SALES_FILE:/var/lib/powerfin/pos/pending_sales.json}

printer.policy=${PRINTER_POLICY:ASK}

printer.island1.ip=${PRINTER_ISLAND1_IP:192.168.1.31}
printer.island1.port=${PRINTER_ISLAND1_PORT:9100}

printer.island2.ip=${PRINTER_ISLAND2_IP:192.168.1.32}
printer.island2.port=${PRINTER_ISLAND2_PORT:9100}

# File-based runtime config (survives restarts, updatable via PUT /api/print/config)
printer.config.file=${PRINTER_CONFIG_FILE:/var/lib/powerfin/pos/printer-config.json}

# Receipt template (editable via PUT /api/print/template)
printer.template.file=${PRINTER_TEMPLATE_FILE:/var/lib/powerfin/pos/receipt-template.txt}

quarkus.log.level=INFO
quarkus.log.console.enable=true
quarkus.log.console.format=%d{HH:mm:ss} %-5p [%c{2.}] %s%e%n
